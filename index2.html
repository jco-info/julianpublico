<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Exámenes ASIR - Seguridad, Servicios e Inglés Técnico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f1f;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2a3a5a;
            position: relative;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c9eff, #3a6ea5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .timer-container {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a1f2e;
            padding: 10px 20px;
            border-radius: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 100;
            font-weight: bold;
            border: 1px solid #2a5f8a;
        }

        .timer-label {
            font-size: 0.8rem;
            color: #8a8a8a;
        }

        .timer-value {
            font-size: 1.2rem;
            color: #6c9eff;
        }

        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #1a1f2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #b0b0b0;
        }

        .nav-btn.active {
            background: #2a5f8a;
            color: white;
            box-shadow: 0 0 15px rgba(42, 95, 138, 0.5);
        }

        .nav-btn:hover:not(.active) {
            background: #2a3a5a;
            color: white;
        }

        .control-panel {
            background: #1a1f2e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #0f1420;
            padding: 10px 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card span:first-child {
            font-size: 0.85rem;
            color: #8a8a8a;
        }

        .stat-card span:last-child {
            font-size: 1.5rem;
            font-weight: bold;
            color: #6c9eff;
        }

        .progress-bar {
            flex: 1;
            height: 10px;
            background: #2a3a5a;
            border-radius: 10px;
            overflow: hidden;
            min-width: 150px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #6c9eff);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .btn {
            background: #2a5f8a;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: #3a3a5a;
        }

        .btn-success {
            background: #2a7a4a;
        }

        .btn-warning {
            background: #8a6a2a;
        }

        .btn-danger {
            background: #8a2a2a;
        }

        .questions-area {
            background: #0f1420;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .question-card {
            background: #1a1f2e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.2s ease;
            border-left: 4px solid #2a5f8a;
        }

        .question-card.correct {
            border-left-color: #4caf50;
            background: #1a2a1a;
        }

        .question-card.incorrect {
            border-left-color: #f44336;
            background: #2a1a1a;
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 15px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .option:hover {
            background: #2a2f3e;
        }

        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2a5f8a;
        }

        .option label {
            cursor: pointer;
            flex: 1;
        }

        .feedback {
            margin-top: 12px;
            font-size: 0.9rem;
            padding: 8px;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct-feedback {
            background: #2a5a2a;
            color: #a0ffa0;
        }

        .feedback.incorrect-feedback {
            background: #5a2a2a;
            color: #ffa0a0;
        }

        .big-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .big-btn {
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            max-width: 900px;
            margin: 20px auto;
            background: #1a1f2e;
            border-radius: 20px;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .close-modal {
            background: #8a2a2a;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .review-question {
            background: #0f1420;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .review-correct {
            color: #4caf50;
            font-weight: bold;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #1a1f2e;
            border-radius: 20px;
        }

        .empty-state h3 {
            margin-bottom: 15px;
        }

        /* Historial de exámenes */
        .history-section {
            background: #1a1f2e;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
        }

        .history-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #6c9eff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-table {
            width: 100%;
            overflow-x: auto;
        }

        .history-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th, .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a3a5a;
        }

        .history-table th {
            background: #0f1420;
            color: #6c9eff;
        }

        .history-table tr:hover {
            background: #2a2f3e;
        }

        .clear-history {
            margin-top: 15px;
            background: #8a2a2a;
            padding: 8px 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .question-card {
                padding: 15px;
            }
            .options {
                padding-left: 5px;
            }
            .stat-card span:last-child {
                font-size: 1.1rem;
            }
            .btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            .timer-container {
                position: relative;
                top: 0;
                right: 0;
                display: inline-block;
                margin-bottom: 15px;
            }
            .header {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .history-table th, .history-table td {
                padding: 8px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 Exámenes ASIR</h1>
        <div class="timer-container">
            <span class="timer-label">Tiempo transcurrido</span><br>
            <span class="timer-value" id="timerDisplay">00:00:00</span>
        </div>
        <div class="nav-menu">
            <button class="nav-btn active" data-exam="seguridad">🛡️ Seguridad y Alta Disponibilidad</button>
            <button class="nav-btn" data-exam="servicios">🌐 Servicios en Red e Internet</button>
            <button class="nav-btn" data-exam="ingles">🇬🇧 Inglés Técnico</button>
        </div>

    <div id="mainContent">
        <div class="empty-state">
            <h3>📋 Selecciona un examen</h3>

        </div>
    </div>

    <div class="history-section" id="historySection">
        <div class="history-title">
            📊 Historial de exámenes
            <button class="btn clear-history" id="clearHistoryBtn">🗑️ Borrar historial</button>
        </div>
        <div id="historyContent" class="history-table">
            <p style="text-align: center; color: #8a8a8a;">Aún no hay exámenes realizados</p>
        </div>
    </div>
</div>

<script>
    // ============================================

        { id: 8, texto: "I turned off the photocopier and ______ the plug.", a: "put out", b: "pulled out", c: "took away", d: "removed", correcta: "b" },
        { id: 9, texto: "Software which blocks attempts by others to access your computer is called ______.", a: "firewall", b: "fire blanket", c: "fire engine", d: "firewall", correcta: "a" },

    { id: 20, texto: "¿Cuáles son los cuatro tipos de amenazas en seguridad informática?", a: "Interrupción, intercepción, duplicación y fabricación", b: "Diseño, fabricación, distribución y comercialización", c: "Interrupción, Intercepción, fabricación y modificación", d: "Modificación, Interrupción, fabricación y denegación", correcta: "c" },
    { id: 21, texto: "Los rootkits se caracterizan por:", a: "Auto-enviarse por correo electrónico", b: "Implementar técnicas para permanecer ocultos", c: "Infectar a otros ejecutables", d: "Presentar publicidad no deseada", correcta: "b" },
    { id: 22, texto: "¿Qué tipo de ataque aprovecha vulnerabilidades en inserción de código javascript en páginas web para ejecutar código malicioso en el navegador del usuario?", a: "SQL Injection", b: "Man-in-the-Middle", c: "Cross-Site Scripting (XSS)", d: "DoS", correcta: "c" },
    { id: 23, texto: "¿Qué tipo de ataque informático se basa en engañar a los usuarios para que revelen información confidencial?", a: "Ataque de fuerza bruta", b: "Ataque de denegación de servicio (DoS)", c: "Phishing", d: "Ataque de inyección SQL", correcta: "c" },
    { id: 24, texto: "¿Qué característica define a un ataque de tipo 'zero-day'?", a: "Requiere interacción del usuario", b: "Aprovecha una vulnerabilidad recién descubierta", c: "Utiliza fuerza bruta para romper contraseñas", d: "Se ejecuta sobre una fecha concreta", correcta: "b" },
    { id: 25, texto: "¿Cuál de los siguientes respuestas es un ataque que consiste en capturar el tráfico de red para obtener contraseñas y datos sensibles?", a: "DoS", b: "Sniffing", c: "Spoofing", d: "Phishing", correcta: "b" },
    { id: 26, texto: "¿Cuál de las siguientes ataques se produce a nivel de enlace de la capa OSI?", a: "Ataque sobre las líneas de cableado", b: "Escucha de tramas con un sniffer", c: "Suplantación de una dirección IP", d: "Publicación de puertos sobre los que se ofrecen servicios", correcta: "b" },
    { id: 27, texto: "¿Para qué sirve la instalación de un honeypot en una red?", a: "Para la detección temprana de intrusos o hacker", b: "Para evitar la descarga de virus o troyanos", c: "Para ofrecer un servicio de alta disponibilidad", d: "Para evitar ataques DoS (Denegación de Servicio)", correcta: "a" },
    { id: 28, texto: "¿Cómo podemos protegernos del ARP spoofing?", a: "Definiendo reglas adecuadas en el cortafuegos", b: "Asignado de forma estática las direcciones MAC", c: "Bloqueando el protocolo ICMP", d: "Cambiando la IP mediante la orden ipconfig -hardware addr", correcta: "b" },
    { id: 29, texto: "¿Cómo podemos protegernos del ARP spoofing?", a: "Definiendo reglas adecuadas en el cortafuegos", b: "Asociando de forma estática las direcciones MAC a las IP de nuestra red", c: "Bloqueando el protocolo ICMP en los equipos de nuestra red", d: "Cambiando la IP mediante la orden ipconfig -hardware addr", correcta: "b" },
    { id: 30, texto: "¿Para qué se puede utilizar la herramienta nmap?", a: "Para explorar los servicios o puertos abiertos", b: "Para detectar posibles bombas lógica en el sistema", c: "Para cerrar o abrir puertos de comunicaciones TCP o UDP", d: "Para ver la posición geográfica de una dirección IP", correcta: "a" },
    { id: 31, texto: "¿Cuál de los siguientes mecanismos de seguridad de redes Wi-Fi está desaconsejado?", a: "Utilizar WPA en vez de WEP", b: "Reducir la intensidad y alcance de la señal", c: "Ocultación del nombre de la red Wi-Fi", d: "Sistema de detección de intrusos inalámbrico (WIDS)", correcta: "a" },
    { id: 32, texto: "¿Cuál de los siguientes mecanismos de seguridad de redes Wi-Fi está desaconsejado?", a: "Filtrado por dirección MAC", b: "Reducir la intensidad y alcance de la señal", c: "Ocultación del nombre de la red Wi-Fi", d: "Sistema de detección de intrusos inalámbrico (WIDS)", correcta: "a" },
    { id: 33, texto: "¿En las redes WIFI con que protocolo de seguridad podemos utilizar un servidor RADIUS?", a: "WEB", b: "WPA2-PSK", c: "WPA3-PSK", d: "WPA2-EAP", correcta: "d" },
    { id: 34, texto: "¿Qué tipo de dispositivo convierte a un host apantallado en una subred apantallada?", a: "Un router de frontera", b: "Un router situado entre la red perimetral y la red externa", c: "Un router situado entre dos segmentos de la red interna", d: "Un router situado entre la red perimetral y la red interna", correcta: "d" },
    { id: 35, texto: "Un hacker ha penetrado en una red tomando el control de uno de los bastiones de la misma. Desde allí iniciará su actividad de búsqueda y ataque de nuevos objetivos en la red interna. ¿Qué dispositivos habría que configurar en la red interna y qué actividades habría que iniciar para averiguar las intenciones del atacante?", a: "Instalar una UTM que gestione el riesgo", b: "Configurar el cortafuegos para impedir las conexiones desde el exterior", c: "Instalar un honey-pot", d: "Modificar las rutas del router de frontera para desviar el ataque", correcta: "c" },
    { id: 36, texto: "Un hacker ha penetrado en una red tomando el control de uno de los bastiones de la misma. Desde allí inicia su actividad de búsqueda y ataque de nuevos objetivos en la red interna. ¿Qué dispositivos habría que configurar en la red interna y para detectar las actividades del atacante?", a: "Instalar una UTM que gestione el riesgo", b: "Configurar el cortafuegos para impedir las conexiones desde el exterior", c: "Instalar un IDS", d: "Modificar las rutas del router de frontera para desviar el ataque", correcta: "c" },
    { id: 37, texto: "¿Cuál de las siguientes afirmaciones sobre segmento DMZ de aplicación ES CIERTA?", a: "Se instalan en esta zona los equipos menos seguros de la red local", b: "Se instalan en esta zona los equipos que ofrecen servicios a Internet", c: "Se instalan en esta zona los equipos con menores velocidades", d: "Se instalan en esta zona los equipos dinámicos de la red", correcta: "b" },
    { id: 38, texto: "¿Cuál de las siguientes afirmaciones sobre cortafuegos de red ES ERRÓNEA?", a: "Permite analizar los mensajes para detectar virus o troyanos", b: "Define reglas en funciones de la cabecera del paquete IP", c: "Filtra tanto paquetes de entrada como de salida de la red", d: "Controla el acceso a determinados puertos y protocolos", correcta: "a" },
    { id: 39, texto: "¿Cuáles de las siguientes características son específicas de un Web Application Firewall?", a: "Filtra por direcciones IP", b: "Filtra por puertos", c: "Filtra por direcciones MAC", d: "Protege de ataques de inyección de código", correcta: "d" },
    { id: 40, texto: "¿Qué característica tecnológica es falsa para el caso del cortafuegos personal de Windows?", a: "Permite el control de puertos e IP de origen de los paquetes entrantes", b: "Permite el control de IP de origen en los paquetes salientes", c: "Puede seleccionar las aplicaciones instaladas que accederán a la red externa", d: "Permite restringir el acceso por tipo de protocolo en cualquiera de las direcciones", correcta: "b" },
    { id: 41, texto: "¿Qué tipo de cortafuegos opera en el nivel de red de la arquitectura TCP/IP?", a: "Red privada virtual común", b: "Cortafuegos basado en proxy", c: "Cortafuegos con inspección de estado", d: "Cortafuegos de filtrado de paquetes", correcta: "d" },
    { id: 42, texto: "En una instalación se desea que los usuarios internos puedan navegar libremente por Internet y se abren en el cortafuegos corporativo las salidas hacia el puerto 80 mediante TCP para conexiones HTTP, así como el puerto TCP-443 para conexiones HTTPS. ¿Cómo NO podría conseguirse esto?", a: "Filtrado dinámico de conexiones de navegación", b: "Filtrado con inspección de estado con reglas de navegación", c: "Filtrado estático de paquetes de salida únicamente", d: "Filtrado estático de paquetes de salida y de entrada relacionados", correcta: "c" },
    { id: 43, texto: "Si queremos BLOQUEAR la entrada a todos los paquetes en nuestro equipo, ejecutaríamos:", a: "iptables -A INPUT -j DROP", b: "iptables -j INPUT -A DROP", c: "iptables -A INPUT -j ACCEPT", d: "iptables -A OUTPUT -j DROP", correcta: "a" },
    { id: 44, texto: "Si queremos permitir la conexión por ssh desde la IP 80.32.23.78 a nuestro equipo ¿qué regla debemos introducir?", a: "iptables -A FORWARD -p udp -d 80.32.23.78 --sport 80 -j ACCEPT", b: "iptables -A INPUT -s 80.32.23.78 -p tcp --dport 22 -j ACCEPT", c: "iptables -A OUTPUT -s ssh -ip 80.32.23.78 -ja -ja ACCEPT", d: "iptables -A INPUT -d 80.32.23.78 -p tcp --dport 20:21 -j ACCEPT", correcta: "b" },
    { id: 45, texto: "Si queremos permitir que desde el exterior se puedan conectar a un servidor web interno con IP 192.168.100.100 ¿Qué regla incluiremos en nuestro cortafuegos de red?", a: "iptables -A FORWARD -d 192.168.100.100 -p tcp --dport 80 -j ACCEPT", b: "iptables -A FORWARD -s 192.168.100.100 -p tcp --dport 80 -j ACCEPT", c: "iptables -A OUTPUT -s html -ip 192.168.100.100 -j ACCEPT", d: "iptables -A INPUT -o 192.168.100.100 -d 80:8080 -j ACCEPT", correcta: "a" },
    { id: 46, texto: "¿Qué efecto tiene esta regla?: iptables -A INPUT -m state --state ESTABLISHED, RELATED -j ACCEPT", a: "Bloquea todas las conexiones nuevas", b: "Permite solo conexiones iniciadas desde el exterior", c: "Permite el tráfico de conexiones ya establecidas o relacionadas", d: "Cierra todos los puertos no usados", correcta: "c" },
    { id: 47, texto: "¿Para que puede servir la siguiente reglas en iptables: iptables -t nat -A PREROUTING -i eth0 -s 192.168.1.0/24 -p tcp --dport 443 -j REDIRECT --to-port 3128", a: "Redirigir el tráfico HTTPS hacia un proxy transparente", b: "Enrutar los paquetes de la red 192.168.1.0/24 hacia Internet", c: "Reenviar a Internet los paquetes del puerto 443 al 3128", d: "Cambiar el mecanismo de NAT fijando ip destinos dentro de la red 192.168.1.0 a los puertos indicados", correcta: "a" },
    { id: 48, texto: "¿Cuántas y cuáles son las conexiones que se realizan en un cortafuegos basado en proxy en el nivel de aplicación?", a: "Una conexión: proxy-servidor", b: "Dos conexiones: cliente-proxy y proxy-servidor", c: "Dos conexiones: cliente-servidor y cliente-proxy", d: "Dos conexiones: cliente-proxy y proxy-cliente", correcta: "b" },
    { id: 49, texto: "¿Qué característica de las siguientes se corresponde con un proxy anónimo?", a: "Se oculta su IP como servidor proxy y oculta la IP del cliente", b: "Se identifica a sí mismo como proxy y falsea la IP del cliente", c: "Se identifica a sí mismo como proxy y no oculta la IP del cliente", d: "Se identifica a sí mismo como proxy, pero oculta la IP del cliente", correcta: "d" },
    { id: 50, texto: "¿Cuáles de las siguientes afirmaciones sobre la arquitectura y ubicación de un servidor proxy es correcta?", a: "Un proxy web puede tener un único adaptador de red", b: "Un servidor proxy tiene al menos dos adaptadores de red", c: "Un servidor proxy siempre realiza dos conexiones: una interna y otra externa", d: "Un proxy debe situarse siempre en el perímetro de la red", correcta: "a" },
    { id: 51, texto: "¿Para qué utiliza el protocolo ICP (Internet Caché Protocol) un proxy?", a: "Para controlar la hora de acceso de las páginas web", b: "Para comprimir la información a almacenar en la caché", c: "Para enviar caché-test a los usuarios no autorizados", d: "Para comunicarse con otros proxy padres o hermanos", correcta: "d" },
    { id: 52, texto: "¿Qué tipo de proxy se utiliza para almacenar en caché contenido web y mejorar el rendimiento?", a: "Proxy transparente", b: "Proxy inverso", c: "Proxy de caché", d: "Proxy SOCKS", correcta: "c" },
    { id: 53, texto: "¿Cuáles de las siguientes afirmaciones relativas a los proxies transparentes es FALSA?", a: "Actúan como puerta de enlace por defecto del servicio al que sirven", b: "En el cliente hay que configurar el puerto de escucha del proxy", c: "Presentan problemas con la autenticación de los usuarios", d: "La petición se envía al proxy mediante una ruta creada en el cliente", correcta: "b" },
    { id: 54, texto: "¿Cuáles son los valores de la cabecera HTTP más relevantes para un proxy?", a: "Server y Date", b: "Content-type y Date", c: "Expires y Last-Modified", d: "html y body", correcta: "c" },
    { id: 55, texto: "¿Con qué instrucciones impediríamos el acceso al portal chuletas.es mediante squid?", a: "acl portal01 dstdomain chuletas.es http_access deny portal01", b: "acl chuletas deny portal01 domain http_access drop chuletas", c: "acl chuletas.es deny all domains http_no_access to chuletas", d: "acl portal01 srcdomain chuletas.es http_access allow portal01", correcta: "a" },
    { id: 56, texto: "¿Que implicarían las instrucciones?\nacl cosa1 time 08:00-14:00\nacl cosa2 urlpath_regex .zip$;\nhttp_access allow cosa1 !cosa2", a: "Impide el acceso de ocho a dos, salvo si descargamos zip", b: "Impide el acceso de ocho a dos, para descargar zip", c: "Permite el acceso de ocho a dos, pero no descargar zip", d: "Permite el acceso de ocho a dos, y la descarga de zip", correcta: "c" },
    { id: 57, texto: "La instalación de una red dispone de un servidor web interno (intranet) en la dirección 192.168.1.5 y de equipos que tienen configurado un DNS interno en la dirección 192.168.1.1. Este servidor DNS interno dirige las peticiones que no es capaz de resolver hacia otro DNS en Internet, en concreto al DNS de Google: 8.8.8.8. Se configura un servidor proxy Squid en la dirección 192.168.1.2 que tiene, entre otras, las siguientes directivas en su fichero de configuración:\nhttp port 3128\nvisible_hostname proxy.miempresa.com\ndns nameservers 8.8.8.8 192.168.1.1\ncache_mgr proxy@miempresa.com\ncache_mem 32 MB\nDesde alguno de los clientes se hace una petición web desde un navegador que apunta su proxy a Squid por el puerto 3128 y navega perfectamente. Sin embargo, no puede navegar por las páginas del servidor web de la intranet. ¿Qué podemos hacer para solucionar el problema?", a: "añadir una nueva directiva dns_nameservers", b: "Añadir una excepción al navegador para el servidor de intranet", c: "Instalar un proxy para la red interna y otro para la red externa", d: "Cambiar el DNS del sistema cliente para que apunte a 8.8.8.8", correcta: "b" },
    { id: 58, texto: "¿Cuál de estos protocolos proporciona seguridad en el nivel de red?", a: "S/MIME", b: "SSL", c: "IPsec", d: "SMTP", correcta: "c" },
    { id: 59, texto: "¿Qué tecnología crea una conexión segura y cifrada a través de una red pública como Internet?", a: "NAT", b: "VPN", c: "IDS", d: "QoS", correcta: "b" },
    { id: 60, texto: "¿Qué característica técnica se asocia al modo túnel IPsec?", a: "El cifrado se realiza de extremo a extremo", b: "El datagrama IP no es encapsulado completamente", c: "El cifrado se realiza entre los dos routers/firewalls entre sedes, pero no de extremo a extremo", d: "Solo encapsula los datos del datagrama IP conservando la cabecera IP original del datagrama", correcta: "c" },
    { id: 61, texto: "¿Cuál es una ventaja clave de las VPN respecto a las líneas dedicadas?", a: "Mayor latencia", b: "Coste reducido", c: "Mayor rigidez", d: "Configuración más compleja", correcta: "b" },
    { id: 62, texto: "¿Cuál de los siguientes protocolos NO se utiliza para implementar una VPN?", a: "IPsec", b: "SSL", c: "L2TP", d: "SMTP", correcta: "d" },
    { id: 63, texto: "De las siguientes afirmaciones relativas a las tecnologías PPP y PPTP, ¿cuál ES FALSA?", a: "Se encapsula una PDU PPP dentro de un datagrama IP", b: "PPP puede encapsular segmentos TCP o UDP", c: "Se encapsula un datagrama IP dentro de una PDU PPP", d: "PPTP requiere una cabecera de protocolo GRE para confeccionar sus túneles", correcta: "c" },
    { id: 64, texto: "En los túneles IP intervienen varias direcciones IP tanto en origen como en destino. Según esto, ¿cuáles de las siguientes afirmaciones ES FALSA?", a: "En un túnel entre sedes solo se cifra entre los dos servidores VPN", b: "En un túnel entre sedes intervienen exclusivamente las dos IP públicas de los servidores VPN", c: "En un túnel Road-warrior se cifra desde el cliente hasta el servidor VPN de destino, pero no hasta el cliente de destino final", d: "En un túnel Road-warrior interviene la IP del cliente y la IP del servidor VPN exclusivamente", correcta: "d" },
    { id: 65, texto: "¿Qué afirmaciones siguientes relativas al encapsulamiento en túnel ES FALSA?", a: "Un túnel válido a través de Internet podría construirse encapsulando IP dentro de NetBIOS", b: "Un túnel válido a través de Internet podría construirse encapsulando NetBIOS dentro de IP", c: "Cualquier túnel evita un ataque Man-In-The-Middle", d: "Los túneles se utilizan en conexiones punto a punto cifradas", correcta: "c" },
    { id: 66, texto: "Un router/firewall publica en su red externa una batería de servidores web localizados en la red interna. ¿Cuál de las siguientes informaciones puede ser VERDADERA?", a: "El router abre un único puerto (el 80) en la red externa, que conectará a cada servidor web", b: "El router debe abrir un puerto distinto por cada servidor web interno", c: "El router debe abrir un puerto distinto por cada cliente en la red externa que se conecte a cualquier servidor web", d: "El router abre un puerto por cada servidor web publicado y otro por cada cliente conectado", correcta: "b" },
    { id: 67, texto: "¿Qué característica no es apropiada para un servidor RADIUS?", a: "RADIUS es un servidor extensible y, por tanto, no cerrado", b: "La autenticación RADIUS utiliza el puerto TCP-1813", c: "Gestiona la autenticación y autorización de usuarios y servicios", d: "Utiliza el puerto UDP-1812", correcta: "b" },
    { id: 68, texto: "Un sistema tiene configurado iptables correctamente, sin embargo, los paquetes no son capaces de enrutarse desde un interfaz de red a otro. ¿Qué debe hacer el administrador del sistema?", a: "Crear una ruta entre los dos interfaces de red", b: "Instalar netfilter", c: "Cambiar las reglas a la tabla FORWARD", d: "Editar el fichero /etc/sysctl.conf y añadir el parámetro net.ipv4.ip_forward=1", correcta: "d" },
    { id: 69, texto: "Un sistema GNU/Linux con dos interfaces de red tiene configurado iptables correctamente, sin embargo, ningún paquete con IP distintas a las de propio equipo es capaz de enrutarse desde un interfaz de red a otro. ¿Qué debe hacer el administrador del sistema?", a: "Utilizar un único interfaz red", b: "Instalar netfilter", c: "Cambiar las reglas a la tabla MANGLE", d: "Editar el fichero /etc/sysctl.conf y añadir el parámetro net.ipv4.ip_forward=1", correcta: "d" },
    { id: 70, texto: "Un sistema de alta disponibilidad tolerante a fallos por replicación:", a: "Tiene varias instancias idénticas del servicio y las peticiones se hacen a todas ellas en paralelo", b: "Tiene varias instancias idénticas del servicio y las peticiones se hacen sólo a uno de ellos", c: "Tiene varias instancias idénticas del servicio y las peticiones se hacen indistintamente a uno de ellos", d: "Tiene varias instancias idénticas del servicio y las peticiones se hacen por orden cada vez a uno de ellos", correcta: "a" },
    { id: 71, texto: "¿Qué modo RAID proporciona redundancia de datos mediante la distribución de la paridad en todos los discos y permite la recuperación de datos en caso de fallo de hasta dos discos?", a: "RAID 0", b: "RAID 1", c: "RAID 5", d: "RAID 6", correcta: "d" },
    { id: 72, texto: "En sistemas Windows un volumen reflejado corresponde a qué nivel RAID.", a: "RAID 0", b: "RAID 6", c: "RAID 1", d: "RAID 5", correcta: "c" },
    { id: 73, texto: "¿Cuáles de estas características NO supone una ventaja en los sistemas cluster?", a: "Alta disponibilidad", b: "Fácil backup", c: "Fácil Escalabilidad", d: "Alto rendimiento", correcta: "b" },
    { id: 74, texto: "Un modelo de virtualización de escritorio ¿con qué característica tecnológica de las siguientes se corresponde?", a: "Abstrae un recurso individual, pero nunca un sistema completo", b: "Abstrae el perfil de un usuario", c: "Encapsula una utilidad", d: "Abstrae un sistema completo", correcta: "d" },
    { id: 75, texto: "¿Qué técnica de virtualización utiliza una traducción binaria por software para simular plataformas completas para conseguir su objetivo?", a: "Virtualización nativa", b: "Virtualización a nivel de sistema operativo", c: "Para-virtualización", d: "Virtualización completa AxH", correcta: "d" },
    { id: 76, texto: "¿Qué tecnología de virtualización permite ejecutar aplicaciones aisladas en el espacio de usuario de un sistema operativo anfitrión, compartiendo el mismo kernel?", a: "Virtualización completa", b: "Paravirtualización", c: "Virtualización mediante contenedores", d: "Virtualización de hardware asistida", correcta: "c" },
    { id: 77, texto: "¿Cuál de los siguientes es un ejemplo común de software de hipervisor de Tipo 2?", a: "VMware ESXi", b: "Microsoft Hyper-V Server (en su modo Core)", c: "VirtualBox", d: "Citrix XenServer", correcta: "c" },
    { id: 78, texto: "¿Cuál es la función principal de Kubernetes?", a: "Orquestar y administrar contenedores en entornos distribuido", b: "Controlar el acceso de usuarios mediante firewalls", c: "Gestionar redes físicas en centros de datos", d: "Monitorizar exclusivamente el uso de CPU y memoria en máquinas virtuales", correcta: "a" },

    { id: 85, texto: "¿Qué es el 'streaming'?", a: "Un tipo de archivo de imagen comprimido", b: "La descarga completa de contenido multimedia antes de su reproducción", c: "La transmisión de contenido en tiempo real a través de internet", d: "Una técnica de compresión de vídeo", correcta: "c" },
    { id: 86, texto: "¿Qué son los 'módulos' en Apache y cuál es su función principal?", a: "Archivos que contienen los directorios web", b: "Extensiones que añaden funcionalidades al servidor", c: "Herramientas para monitorizar el rendimiento", d: "Registros de actividad del servidor", correcta: "b" },
    { id: 87, texto: "¿Qué parámetro permite que los usuarios suban archivos al servidor vsftpd?", a: "file_upload=YES", b: "write_enable=YES", c: "allow_put=YES", d: "upload_files=YES", correcta: "b" }
];

    // Variables globales
    let currentExam = 'seguridad';
    let currentQuestions = [];
    let timerInterval = null;
    let startTime = null;
    let examStarted = false;
    let examCorrected = false;

    // Historial de exámenes (se guarda en localStorage)
    let examHistory = [];

    function loadHistory() {
        const saved = localStorage.getItem('examHistory_asir');
        if (saved) {
            examHistory = JSON.parse(saved);
        } else {
            examHistory = [];
        }
        renderHistory();
    }

    function saveHistory() {
        localStorage.setItem('examHistory_asir', JSON.stringify(examHistory));
        renderHistory();
    }

    function addExamToHistory(examName, score, correctCount, incorrectCount, timeSpent, date) {
        examHistory.unshift({
            id: Date.now(),
            exam: examName,
            date: date,
            time: timeSpent,
            score: score,
            correct: correctCount,
            incorrect: incorrectCount
        });
        // Mantener solo los últimos 50 exámenes
        if (examHistory.length > 50) examHistory.pop();
        saveHistory();
    }

    function renderHistory() {
        const historyContent = document.getElementById('historyContent');
        if (!historyContent) return;
        
        if (examHistory.length === 0) {
            historyContent.innerHTML = '<p style="text-align: center; color: #8a8a8a;">Aún no hay exámenes realizados</p>';
            return;
        }
        
        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Examen</th>
                        <th>Tiempo</th>
                        <th>Nota</th>
                        <th>Aciertos</th>
                        <th>Fallos</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        examHistory.forEach(entry => {
            html += `
                <tr>
                    <td>${entry.date}</td>
                    <td>${entry.exam}</td>
                    <td>${entry.time}</td>
                    <td style="color: ${entry.score >= 5 ? '#4caf50' : '#f44336'}">${entry.score}/10</td>
                    <td>${entry.correct}</td>
                    <td>${entry.incorrect}</td>
                </tr>
            `;
        });
        
        html += `
                </tbody>
            </table>
        `;
        
        historyContent.innerHTML = html;
    }

    function clearHistory() {
        if (confirm('¿Estás seguro de que quieres borrar todo el historial de exámenes?')) {
            examHistory = [];
            saveHistory();
        }
    }

    // DOM Elements
    const mainContent = document.getElementById('mainContent');
    const timerDisplay = document.getElementById('timerDisplay');

    function formatTime(seconds) {
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateTimer() {
        if (!startTime) {
            timerDisplay.textContent = '00:00:00';
            return;
        }
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        timerDisplay.textContent = formatTime(elapsed);
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        startTime = Date.now();
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function resetTimer() {
        stopTimer();
        startTime = null;
        timerDisplay.textContent = '00:00:00';
    }

    function getRandomQuestions(pool, count = 70) {
        const shuffled = [...pool];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, Math.min(count, shuffled.length));
    }

    function countAnswered() {
        let answered = 0;
        currentQuestions.forEach((_, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            if (selected) answered++;
        });
        return answered;
    }

    function updateProgress() {
        const answered = countAnswered();
        const total = currentQuestions.length;
        const percent = (answered / total) * 100;
        const fill = document.querySelector('.progress-fill');
        if (fill) fill.style.width = `${percent}%`;
        const answeredSpan = document.getElementById('answeredCount');
        if (answeredSpan) answeredSpan.textContent = answered;
    }

    function renderTest() {
        if (!currentQuestions.length) {
            mainContent.innerHTML = `
                <div class="empty-state">
                    <h3>📋 No hay preguntas disponibles</h3>
                    <p>Selecciona otro examen o añade preguntas a la base de datos</p>
                    <button class="btn" id="startEmptyBtn">Comenzar test</button>
                </div>
            `;
            const startBtn = document.getElementById('startEmptyBtn');
            if (startBtn) startBtn.addEventListener('click', () => startExam());
            return;
        }

        let html = `
            <div class="control-panel">
                <div class="stats">
                    <div class="stat-card">
                        <span>Preguntas</span><br>
                        <span>${currentQuestions.length}</span>
                    </div>
                    <div class="stat-card">
                        <span>Respondidas</span><br>
                        <span id="answeredCount">0</span>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
            </div>
            <div class="questions-area" id="questionsArea">
        `;

        currentQuestions.forEach((q, idx) => {
            html += `
                <div class="question-card" id="qCard${idx}">
                    <div class="question-text"><strong>${idx + 1}.</strong> ${q.texto}</div>
                    <div class="options">
                        <div class="option">
                            <input type="radio" name="q${idx}" value="a" id="q${idx}a">
                            <label for="q${idx}a">a) ${q.a}</label>
                        </div>
                        <div class="option">
                            <input type="radio" name="q${idx}" value="b" id="q${idx}b">
                            <label for="q${idx}b">b) ${q.b}</label>
                        </div>
                        <div class="option">
                            <input type="radio" name="q${idx}" value="c" id="q${idx}c">
                            <label for="q${idx}c">c) ${q.c}</label>
                        </div>
                        <div class="option">
                            <input type="radio" name="q${idx}" value="d" id="q${idx}d">
                            <label for="q${idx}d">d) ${q.d}</label>
                        </div>
                    </div>
                    <div class="feedback" id="feedback${idx}"></div>
                </div>
            `;
        });

        html += `
            <div class="big-buttons">
                <button class="btn btn-success" id="correctBtn">✅ Corregir examen</button>
                <button class="btn btn-secondary" id="newTestBtn">🔄 Hacer de nuevo</button>
            </div>
        `;

        mainContent.innerHTML = html;

        for (let i = 0; i < currentQuestions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', () => updateProgress());
            });
        }

        document.getElementById('correctBtn').addEventListener('click', () => correctExam());
        document.getElementById('newTestBtn').addEventListener('click', () => startExam());
    }

    function correctExam() {
        if (!examStarted) return;

        let correctCount = 0;
        let incorrectCount = 0;
        let unansweredCount = 0;
        let totalPoints = 0;

        currentQuestions.forEach((q, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            const card = document.getElementById(`qCard${idx}`);
            const feedbackDiv = document.getElementById(`feedback${idx}`);
            
            let isCorrect = false;
            let userAnswer = null;
            
            if (selected) {
                userAnswer = selected.value;
                isCorrect = (userAnswer === q.correcta);
                if (isCorrect) {
                    correctCount++;
                    totalPoints += 1;
                    card.classList.add('correct');
                    feedbackDiv.innerHTML = `<strong>✅ Correcto!</strong> La respuesta correcta es: ${q.correcta}) ${q[q.correcta]}`;
                    feedbackDiv.classList.add('show', 'correct-feedback');
                } else {
                    incorrectCount++;
                    totalPoints -= 0.33;
                    card.classList.add('incorrect');
                    feedbackDiv.innerHTML = `<strong>❌ Incorrecto.</strong> Tu respuesta: ${userAnswer}) ${q[userAnswer]}<br><strong>Correcta:</strong> ${q.correcta}) ${q[q.correcta]}`;
                    feedbackDiv.classList.add('show', 'incorrect-feedback');
                }
            } else {
                unansweredCount++;
                totalPoints -= 0.33;
                card.classList.add('incorrect');
                feedbackDiv.innerHTML = `<strong>❌ Sin responder.</strong> La respuesta correcta es: ${q.correcta}) ${q[q.correcta]}`;
                feedbackDiv.classList.add('show', 'incorrect-feedback');
            }
        });

        const finalScore = totalPoints / 6;
        const finalScoreRounded = Math.max(0, Math.min(10, finalScore)).toFixed(2);
        
        stopTimer();
        const elapsedSeconds = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
        const timeSpent = formatTime(elapsedSeconds);
        
        // Obtener nombre del examen actual
        let examName = '';
        if (currentExam === 'seguridad') examName = 'Seguridad y Alta Disponibilidad';
        else if (currentExam === 'servicios') examName = 'Servicios en Red e Internet';
        else examName = 'Inglés Técnico';
        
        // Guardar en historial
        const now = new Date();
        const dateStr = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        addExamToHistory(examName, parseFloat(finalScoreRounded), correctCount, incorrectCount + unansweredCount, timeSpent, dateStr);

        // Mostrar resultados con botón de corregir al final (pero ya está corregido)
        const resultsHtml = `
            <div class="control-panel" style="margin-top: 20px; background: #2a3a5a;">
                <div class="stats">
                    <div class="stat-card"><span>✅ Aciertos</span><br><span>${correctCount}</span></div>
                    <div class="stat-card"><span>❌ Fallos/Sin responder</span><br><span>${incorrectCount + unansweredCount}</span></div>
                    <div class="stat-card"><span>📊 Nota</span><br><span>${finalScoreRounded} / 10</span></div>
                    <div class="stat-card"><span>⏱️ Tiempo</span><br><span>${timeSpent}</span></div>
                </div>
                <div class="big-buttons">
                    <button class="btn btn-warning" id="reviewBtn">📖 Repasar fallos</button>
                    <button class="btn btn-secondary" id="newTestAfterCorrectBtn">🔄 Hacer de nuevo</button>
                </div>
            </div>
        `;

        const questionsArea = document.getElementById('questionsArea');
        if (questionsArea) {
            questionsArea.insertAdjacentHTML('afterend', resultsHtml);
        }

        const reviewBtn = document.getElementById('reviewBtn');
        const newTestBtn = document.getElementById('newTestAfterCorrectBtn');
        if (reviewBtn) reviewBtn.addEventListener('click', () => reviewMistakes());
        if (newTestBtn) newTestBtn.addEventListener('click', () => startExam());
        
        const correctBtn = document.getElementById('correctBtn');
        if (correctBtn) correctBtn.disabled = true;
        examCorrected = true;
    }

    function reviewMistakes() {
        const mistakes = [];
        currentQuestions.forEach((q, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            let isCorrect = false;
            if (selected) {
                isCorrect = (selected.value === q.correcta);
            }
            if (!isCorrect) {
                mistakes.push({ ...q, userAnswer: selected ? selected.value : null });
            }
        });

        if (mistakes.length === 0) {
            alert('🎉 ¡No tienes fallos! Excelente trabajo.');
            return;
        }

        let modalHtml = `
            <div class="modal" id="reviewModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>📖 Repaso de fallos (${mistakes.length})</h2>
                        <div class="close-modal">✖️ Cerrar</div>
                    </div>
        `;

        mistakes.forEach((q, idx) => {
            modalHtml += `
                <div class="review-question">
                    <strong>${idx + 1}.</strong> ${q.texto}<br>
                    <span style="color: #ff9999">❌ Tu respuesta: ${q.userAnswer ? q.userAnswer + ') ' + q[q.userAnswer] : 'Sin responder'}</span><br>
                    <span class="review-correct">✅ Correcta: ${q.correcta}) ${q[q.correcta]}</span>
                </div>
            `;
        });

        modalHtml += `
                </div>
            </div>
        `;

        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('reviewModal');
        const closeBtn = modal.querySelector('.close-modal');
        closeBtn.addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });
    }

    function startExam() {
        resetTimer();
        examStarted = true;
        examCorrected = false;
        
        let pool;
        if (currentExam === 'seguridad') pool = preguntasSeguridad;
        else if (currentExam === 'servicios') pool = preguntasServicios;
        else pool = preguntasIngles;
        
        if (pool.length === 0) {
            mainContent.innerHTML = `
                <div class="empty-state">
                    <h3>📋 Próximamente disponible</h3>
                    <p>Este examen estará disponible pronto</p>
                </div>
            `;
            examStarted = false;
            return;
        }
        
        currentQuestions = getRandomQuestions(pool, 70);
        renderTest();
        startTimer();
        updateProgress();
    }

    function switchExam(exam) {
        currentExam = exam;
        examStarted = false;
        examCorrected = false;
        resetTimer();
        
        let pool, examTitle;
        if (exam === 'seguridad') {
            pool = preguntasSeguridad;
            examTitle = 'Seguridad y Alta Disponibilidad';
        } else if (exam === 'servicios') {
            pool = preguntasServicios;
            examTitle = 'Servicios en Red e Internet';
        } else {
            pool = preguntasIngles;
            examTitle = 'Inglés Técnico';
        }
        
        if (pool.length === 0) {
            mainContent.innerHTML = `
                <div class="empty-state">
                    <h3>📋 Próximamente disponible</h3>
                    <p>El examen de ${examTitle} estará disponible pronto</p>
                </div>
            `;
            return;
        }
        
        mainContent.innerHTML = `
            <div class="empty-state">
                <h3>📋 ${examTitle}</h3>
                <p>Preguntas disponibles: ${pool.length}</p>
                <button class="btn btn-success" id="startExamBtn">🚀 Comenzar test</button>
            </div>
        `;
        
        const startBtn = document.getElementById('startExamBtn');
        if (startBtn) startBtn.addEventListener('click', () => startExam());
    }

    // Navegación
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            switchExam(btn.dataset.exam);
        });
    });

    // Botón borrar historial
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    if (clearHistoryBtn) clearHistoryBtn.addEventListener('click', clearHistory);

    // Inicializar
    loadHistory();
    switchExam('seguridad');
</script>
</body>
</html>
