<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Test POO Python · Modo Oscuro · Preguntas Aleatorias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0c15;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 2rem 1.5rem;
            color: #eef2ff;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header */
        .test-header {
            background: #0f172a;
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #1e293b;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #94a3b8;
            margin-bottom: 1.8rem;
            border-left: 3px solid #3b82f6;
            padding-left: 1rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-end;
            justify-content: space-between;
        }

        .num-selector {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .num-selector label {
            font-weight: 600;
            color: #cbd5e1;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, button {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:hover, button:hover {
            border-color: #60a5fa;
            transform: scale(1.01);
        }

        button {
            background: #3b82f6;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }

        button:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        /* Tarjetas de preguntas */
        .question-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 1.5rem;
            padding: 1.6rem;
            margin-bottom: 1.8rem;
            transition: 0.1s;
        }

        .question-title {
            font-size: 1rem;
            font-weight: 600;
            background: #1e293b;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            margin-bottom: 1rem;
            color: #a5f3fc;
        }

        .question-text {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.2rem;
            background: #0a0f1a;
            padding: 1rem;
            border-radius: 1rem;
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            border-left: 3px solid #3b82f6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-top: 0.8rem;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.8rem;
            background: #1a2538;
            border-radius: 1rem;
        }

        .option:hover {
            background: #2d3a4f;
        }

        input[type="radio"], input[type="checkbox"] {
            width: 1.1rem;
            height: 1.1rem;
            accent-color: #3b82f6;
        }

        input[type="text"], .rel-select {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            color: white;
        }

        .rel-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 0.7rem;
            background: #111827;
            padding: 0.5rem;
            border-radius: 1rem;
        }

        .rel-label {
            min-width: 200px;
            font-weight: 500;
        }

        select.rel-select {
            min-width: 140px;
            cursor: pointer;
        }

        .feedback {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            background: #0a0f1a;
            border-left: 4px solid #3b82f6;
        }

        .result-bar {
            margin-top: 2rem;
            background: #0f172a;
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: center;
            position: sticky;
            bottom: 1rem;
            border: 1px solid #1e293b;
        }

        .score {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        hr {
            border-color: #1e293b;
            margin: 1rem 0;
        }

        code {
            background: #00000040;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="test-header">
        <h1>🐍 Test POO · Python</h1>
        <div class="sub">Clases, objetos, métodos, atributos — preguntas aleatorias + respuestas mezcladas</div>
        <div class="controls">
            <div class="num-selector">
                <label>📌 Número de preguntas</label>
                <select id="numQuestionsSelect">
                    <option value="5">5 preguntas</option>
                    <option value="10" selected>10 preguntas</option>
                    <option value="15">15 preguntas</option>
                    <option value="20">20 preguntas</option>
                    <option value="30">30 preguntas</option>
                </select>
            </div>
            <div>
                <button id="newTestBtn">🔄 Generar test aleatorio</button>
                <button id="submitBtn" style="background:#10b981; margin-left: 1rem;">✅ Corregir test</button>
            </div>
        </div>
    </div>

    <div id="questionsContainer"></div>
    <div id="resultArea" class="result-bar" style="display: none;"></div>
</div>

<script>
    // --------------------------------------------------------------
    // BASE DE DATOS COMPLETA (58 preguntas únicas y bien tipadas)

    const MASTER_QUESTIONS = [
        // ÚNICAS (30)

        { id: 2, type: "unique", text: "class Cuenta:\n    def __init__(self, saldo=0):\n        self.saldo = saldo\n    def ingresar(self, cantidad):\n        self.saldo += cantidad\n    def retirar(self, cantidad):\n        if cantidad <= self.saldo:\n            self.saldo -= cantidad\n\nc = Cuenta(50)\nc.ingresar(20)\nc.retirar(10)\nprint(c.saldo)", options: ["40","60","50","70","Da error"], correct: "60", feedback: "50→70→60" },

        { id: 5, type: "unique", text: "class Libro:\n    def __init__(self, titulo):\n        self.titulo = titulo\n        self.prestado = False\n    def prestar(self):\n        self.prestado = True\n\nlibro = Libro('Dune')\nlibro.prestar()\nprint(libro.prestado)", options: ["True","Da error","False","prestado","Dune"], correct: "True", feedback: "prestar() cambia a True" },
        { id: 6, type: "unique", text: "class Alumno:\n    def __init__(self, nota1, nota2):\n        self.nota1 = nota1\n        self.nota2 = nota2\n    def media(self):\n        return (self.nota1 + self.nota2) / 2\n\na = Alumno(6,8)\nprint(a.media())", options: ["7.0","Da error","14","6.8","7"], correct: "7.0", feedback: "(6+8)/2=7.0" },
        { id: 7, type: "unique", text: "class Cuenta:\n    def __init__(self, saldo=0):\n        self.saldo = saldo\n    def ingresar(self, cantidad):\n        self.saldo += cantidad\n\nc = Cuenta(10)\nc.ingresar(5)\nprint(c.saldo)", options: ["5","15","10","0","Error"], correct: "15", feedback: "10+5=15" },
        { id: 8, type: "unique", text: "Rectangulo(3,6).area()", options: ["9","12","18","36","6"], correct: "18", feedback: "3*6=18" },
        { id: 9, type: "unique", text: "Termometro(7).subir(4).temperatura", options: ["3","7","11","4","28"], correct: "11", feedback: "7+4=11" },
        { id: 10, type: "unique", text: "class Persona:\n    def __init__(self, nombre):\n        self.nombre = nombre\np = Persona('Luis')\nprint(p.nombre)", options: ["self.nombre","None","Luis","Da error","nombre"], correct: "Luis", feedback: "Atributo nombre = Luis" },
        { id: 11, type: "unique", text: "class Coche:\n    def __init__(self, velocidad=0):\n        self.velocidad = velocidad\n    def acelerar(self, cantidad):\n        self.velocidad += cantidad\nc = Coche('Ford')\nc.acelerar(30)\nprint(c.velocidad)", options: ["Error falta modelo","0","Ford","Error no existe","30"], correct: "30", feedback: "velocidad 0+30=30" },
        { id: 12, type: "unique", text: "class Libro:\n    def __init__(self):\n        self.prestado = False\n    def prestar(self):\n        self.prestado = True\n    def devolver(self):\n        self.prestado = False\nl = Libro()\nl.prestar()\nl.devolver()\nprint(l.prestado)", options: ["0","Error","True","False","prestado"], correct: "False", feedback: "prestar y devolver vuelve a False" },
        { id: 13, type: "unique", text: "a = Coche(); b = Coche(10); a.acelerar(15); b.acelerar(5); print(a.velocidad, b.velocidad)", options: ["Error","0 15","15 15","15 5","10 15"], correct: "15 15", feedback: "ambos 15" },
        { id: 14, type: "unique", text: "class Bombilla:\n    def __init__(self):\n        self.encendida = False\n    def interruptor(self):\n        self.encendida = not self.encendida\nb = Bombilla()\nb.interruptor()\nb.interruptor()\nprint(b.encendida)", options: ["False","0","Error","1","True"], correct: "False", feedback: "dos veces vuelve a False" },
        { id: 15, type: "unique", text: "Rectangulo(3,4).area()", options: ["7","12","16","14","10"], correct: "12", feedback: "3*4=12" },
        { id: 16, type: "unique", text: "Alumno(9,1).aprobado()", options: ["True","False","Error","1","0"], correct: "True", feedback: "media 5 >=5" },
        { id: 17, type: "unique", text: "Rectangulo(4,3).area() + 2", options: ["Error","11","14","10","24"], correct: "14", feedback: "12+2=14" },

        { id: 19, type: "unique", text: "Termometro(15).subir(5).bajar(2).temperatura", options: ["18","15","Error","20","17"], correct: "18", feedback: "15+5-2=18" },

        { id: 33, type: "multiple", text: "Rectangulo(3,4)\nr = Rectangulo(3,4)", options: ["r.altura=4","r es objeto Rectangulo","Da error","area()=12","r.base=3","area suma base+altura"], correct: ["r.altura=4","r es objeto Rectangulo","area()=12","r.base=3"], feedback: "base 3, altura4, area12" },
        { id: 34, type: "multiple", text: "Cuenta(40).retirar(10)", options: ["c es objeto","saldo=40 al inicio","elimina saldo","saldo final 30","retirar suma","solo resta si alcanza"], correct: ["c es objeto","saldo=40 al inicio","saldo final 30","solo resta si alcanza"], feedback: "40→30" },
        { id: 35, type: "multiple", text: "Bombilla b.encender()", options: ["b es método","encendida cambia","no crea objetos","tras encender=True","encender devuelve True","inicio=False"], correct: ["encendida cambia","tras encender=True","inicio=False"], feedback: "False->True" },

        { id: 61, type: "completar", text: "print(p._____ * p.stock)  // atributo que falta es precio", correct: "precio", feedback: "precio" },
        { id: 62, type: "completar", text: "print(c._____())  // método total", correct: "total", feedback: "total" },
        { id: 63, type: "completar", text: "devolver: self.prestado = ___; l.___(); l.___(); print(l.___)", correct: "False;prestar;devolver;prestado", feedback: "False, prestar, devolver, prestado" },
        { id: 64, type: "completar", text: "t.___(2); t.___(1); print(t.___)  // bajar, subir, temperatura", correct: "bajar;subir;temperatura", feedback: "bajar, subir, temperatura" },

        // EXACTAS (4)
        { id: 65, type: "exact", text: "Cuenta(10).ingresar(5) → ¿saldo final?", correct: "15", feedback: "10+5=15" },
        { id: 66, type: "exact", text: "Rectangulo(3,6).area() → ¿número exacto?", correct: "18", feedback: "3*6=18" },
        { id: 67, type: "exact", text: "Termometro(7).subir(4) → temperatura", correct: "11", feedback: "7+4=11" },
        { id: 68, type: "exact", text: "Rectangulo(3,4).area()", correct: "12", feedback: "12" }
    ];

    // Helper: barajar
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getRandomQuestions(n) {
        let shuffledAll = shuffleArray([...MASTER_QUESTIONS]);
        return shuffledAll.slice(0, n);
    }

    // Mezclar opciones para unique/multiple
    function shuffleOptionsIfNeeded(question) {
        if (question.type === "unique" || question.type === "multiple") {
            return shuffleArray([...question.options]);
        }
        return null;
    }

    let currentQuestions = [];
    let optionsMap = new Map(); // guarda opciones mezcladas

    function renderTest(questions) {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        currentQuestions = questions;
        optionsMap.clear();

        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.dataset.qid = q.id;
            card.dataset.type = q.type;

            const titleSpan = document.createElement('div');
            titleSpan.className = 'question-title';
            titleSpan.innerText = `Pregunta ${idx+1} · ${q.type === 'unique' ? 'Única' : q.type === 'multiple' ? 'Múltiple' : q.type === 'relacionar' ? 'Relacionar' : q.type === 'completar' ? 'Completar' : 'Valor exacto'}`;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'question-text';
            textDiv.innerText = q.text;

            card.appendChild(titleSpan);
            card.appendChild(textDiv);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            if (q.type === 'unique') {
                const shuffled = shuffleOptionsIfNeeded(q);
                optionsMap.set(q.id, shuffled);
                shuffled.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option';
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `q_${q.id}`;
                    radio.value = opt;
                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(' ' + opt));
                    optionsDiv.appendChild(label);
                });
            } 
            else if (q.type === 'multiple') {
                const shuffled = shuffleOptionsIfNeeded(q);
                optionsMap.set(q.id, shuffled);
                shuffled.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.name = `q_${q.id}`;
                    cb.value = opt;
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(' ' + opt));
                    optionsDiv.appendChild(label);
                });
            }
            else if (q.type === 'relacionar') {
                const leftItems = q.left;
                const rightOpts = q.rightOptions;
                const shuffledRight = shuffleArray([...rightOpts]);
                optionsMap.set(q.id, shuffledRight);
                leftItems.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'rel-row';
                    row.innerHTML = `<span class="rel-label">${item} → </span>
                                     <select class="rel-select" data-qid="${q.id}" data-pos="${i}">
                                        <option value="">-- Selecciona --</option>
                                        ${shuffledRight.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                                     </select>`;
                    optionsDiv.appendChild(row);
                });
            }
            else if (q.type === 'completar') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'Escribe la respuesta (si son varias separa con ;)';
                input.style.width = '100%';
                input.style.maxWidth = '400px';
                input.className = 'completar-input';
                input.setAttribute('data-qid', q.id);
                optionsDiv.appendChild(input);
                const small = document.createElement('small');
                small.innerText = '📝 Ejemplo: palabra1;palabra2';
                small.style.display = 'block';
                small.style.marginTop = '0.3rem';
                small.style.color = '#94a3b8';
                optionsDiv.appendChild(small);
            }
            else if (q.type === 'exact') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'Escribe el valor exacto';
                input.style.width = '200px';
                input.className = 'exact-input';
                input.setAttribute('data-qid', q.id);
                optionsDiv.appendChild(input);
            }

            card.appendChild(optionsDiv);
            const fbDiv = document.createElement('div');
            fbDiv.className = 'feedback';
            fbDiv.style.display = 'none';
            fbDiv.id = `fb_${q.id}`;
            card.appendChild(fbDiv);
            container.appendChild(card);
        });
        document.getElementById('resultArea').style.display = 'none';
    }

    function evaluateTest() {
        let score = 0;
        const total = currentQuestions.length;

        for (let q of currentQuestions) {
            let isCorrect = false;
            let userAnswer = null;
            let expected = q.correct;

            if (q.type === 'unique') {
                const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
                userAnswer = selected ? selected.value : null;
                isCorrect = (userAnswer === expected);
                if (isCorrect) score++;
            }
            else if (q.type === 'multiple') {
                const selected = Array.from(document.querySelectorAll(`input[name="q_${q.id}"]:checked`)).map(cb => cb.value);
                userAnswer = selected;
                let expectedArr = Array.isArray(expected) ? expected : [expected];
                const normUser = [...userAnswer].sort();
                const normExp = [...expectedArr].sort();
                isCorrect = normUser.length === normExp.length && normUser.every((v,i) => v === normExp[i]);
                if (isCorrect) score++;
            }
            else if (q.type === 'relacionar') {
                const selects = document.querySelectorAll(`.rel-select[data-qid="${q.id}"]`);
                userAnswer = Array.from(selects).map(sel => sel.value);
                let expectedArr = Array.isArray(expected) ? expected : [expected];
                isCorrect = userAnswer.length === expectedArr.length && userAnswer.every((val,i) => val === expectedArr[i]);
                if (isCorrect) score++;
            }
            else if (q.type === 'completar') {
                const input = document.querySelector(`.completar-input[data-qid="${q.id}"]`);
                let raw = input ? input.value.trim().toLowerCase() : '';
                let userParts = raw.split(';').map(s => s.trim());
                let expectedParts = expected.toLowerCase().split(';').map(s => s.trim());
                isCorrect = userParts.length === expectedParts.length && userParts.every((p,i) => p === expectedParts[i]);
                if (isCorrect) score++;
            }
            else if (q.type === 'exact') {
                const input = document.querySelector(`.exact-input[data-qid="${q.id}"]`);
                userAnswer = input ? input.value.trim() : '';
                isCorrect = (userAnswer == expected);
                if (isCorrect) score++;
            }

            const fbDiv = document.getElementById(`fb_${q.id}`);
            if (fbDiv) {
                fbDiv.style.display = 'block';
                fbDiv.innerHTML = `<strong>${isCorrect ? '✅ Correcto' : '❌ Incorrecto'}</strong><br>${q.feedback}<br>📌 Esperado: ${expected}`;
                fbDiv.style.borderLeftColor = isCorrect ? '#10b981' : '#ef4444';
            }
        }

        const resultDiv = document.getElementById('resultArea');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<div class="score">🎯 Puntuación: ${score} / ${total}</div>
                               <button id="retryBtn" class="btn-secondary" style="margin-top:1rem">🔄 Nuevo test aleatorio</button>`;
        document.getElementById('retryBtn')?.addEventListener('click', () => generateNewTest());
    }

    function generateNewTest() {
        const num = parseInt(document.getElementById('numQuestionsSelect').value);
        const randomQs = getRandomQuestions(num);
        renderTest(randomQs);
    }

    document.getElementById('newTestBtn').addEventListener('click', generateNewTest);
    document.getElementById('submitBtn').addEventListener('click', evaluateTest);
    generateNewTest();
</script>
</body>
</html>
