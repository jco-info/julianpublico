<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Test POO Python</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0c15;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 2rem 1.5rem;
            color: #eef2ff;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header */
        .test-header {
            background: #0f172a;
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #1e293b;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #94a3b8;
            margin-bottom: 1.8rem;
            border-left: 3px solid #3b82f6;
            padding-left: 1rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-end;
            justify-content: space-between;
        }

        .num-selector {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .num-selector label {
            font-weight: 600;
            color: #cbd5e1;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, button {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:hover, button:hover {
            border-color: #60a5fa;
            transform: scale(1.01);
        }

        button {
            background: #3b82f6;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }

        button:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        /* Tarjetas de preguntas */
        .question-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 1.5rem;
            padding: 1.6rem;
            margin-bottom: 1.8rem;
        }

        .question-title {
            font-size: 1rem;
            font-weight: 600;
            background: #1e293b;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            margin-bottom: 1rem;
            color: #a5f3fc;
        }

        .question-text {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.2rem;
            background: #0a0f1a;
            padding: 1rem;
            border-radius: 1rem;
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            border-left: 3px solid #3b82f6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-top: 0.8rem;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.8rem;
            background: #1a2538;
            border-radius: 1rem;
        }

        .option:hover {
            background: #2d3a4f;
        }

        input[type="radio"], input[type="checkbox"] {
            width: 1.1rem;
            height: 1.1rem;
            accent-color: #3b82f6;
        }

        input[type="text"] {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            color: white;
        }

        .feedback {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            background: #0a0f1a;
            border-left: 4px solid #3b82f6;
        }

        .result-bar {
            margin-top: 2rem;
            background: #0f172a;
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: center;
            position: sticky;
            bottom: 1rem;
            border: 1px solid #1e293b;
        }

        .score {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        hr {
            border-color: #1e293b;
            margin: 1rem 0;
        }
    </style>
</head>
<body>

    <div class="test-header">
        <h1>🐍 Test POO · Python</h1>

    </div>

    <div id="questionsContainer"></div>
    <div id="resultArea" class="result-bar" style="display: none;"></div>
</div>

<script>
    // ============================================================

        { id: 4, type: "multiple", text: "Observa el código y marca las afirmaciones correctas.\n\nclass Termometro:\n    def __init__(self, temperatura=0):\n        self.temperatura = temperatura\n\n    def subir(self, grados):\n        self.temperatura += grados\n\nt = Termometro()\nt.subir(3)", options: ["subir crea un objeto nuevo", "La temperatura inicial es 0", "temperatura=0 es un valor por defecto", "La temperatura final es -3", "Después de subir(3), la temperatura vale 3", "t es una función"], correct: ["La temperatura inicial es 0", "temperatura=0 es un valor por defecto", "Después de subir(3), la temperatura vale 3"], feedback: "El termómetro empieza en 0 por defecto y subir(3) añade 3." },

        // ==================== CUESTIONARIO 2 POO ====================
        { id: 6, type: "multiple", text: "Observa el código y marca las afirmaciones correctas.\n\nclass Termometro:\n    def __init__(self, temperatura=0):\n        self.temperatura = temperatura\n\n    def subir(self, grados):\n        self.temperatura += grados\n\nt = Termometro()\nt.subir(3)", options: ["Después de subir(3), la temperatura vale 3", "temperatura=0 es un valor por defecto", "subir crea un objeto nuevo", "t es una función", "La temperatura inicial es 0", "La temperatura final es -3"], correct: ["Después de subir(3), la temperatura vale 3", "temperatura=0 es un valor por defecto", "La temperatura inicial es 0"], feedback: "El termómetro empieza en 0 por defecto y subir(3) añade 3." },
        
        { id: 7, type: "multiple", text: "Observa el código y marca las afirmaciones correctas.\n\nclass Cuenta:\n    def __init__(self, saldo):\n        self.saldo = saldo\n\n    def retirar(self, cantidad):\n        if cantidad <= self.saldo:\n            self.saldo -= cantidad\n\nc = Cuenta(40)\nc.retirar(10)", options: ["c.saldo vale 40 justo después de crear el objeto", "retirar solo resta si hay saldo suficiente", "El código elimina el atributo saldo", "El método retirar suma la cantidad", "Después de retirar(10), c.saldo vale 30", "c es un objeto de la clase Cuenta"], correct: ["c.saldo vale 40 justo después de crear el objeto", "retirar solo resta si hay saldo suficiente", "Después de retirar(10), c.saldo vale 30", "c es un objeto de la clase Cuenta"], feedback: "La cuenta empieza con 40 y retirar(10) deja el saldo en 30." },

        { id: 9, type: "relacionar", text: "Relaciona cada hueco con la palabra que completa correctamente el código.\n\nClases: Libro, Persona, Cuenta, Alumno, Coche", left: ["class Libro: print(l._____)", "class Persona: print(p._____)", "class Cuenta: print(c._____)", "class Alumno: print(a._____)", "class Coche: print(c._____)"], rightOptions: ["prestado", "nombre", "saldo", "nota", "velocidad"], correct: ["prestado", "nombre", "saldo", "nota", "velocidad"], feedback: "Cada objeto imprime el atributo definido en su constructor." },

        { id: 11, type: "exact", text: "¿Qué número exacto mostrará este código?\n\nclass Cuenta:\n    def __init__(self, saldo=0):\n        self.saldo = saldo\n\n    def ingresar(self, cantidad):\n        self.saldo += cantidad\n\nc = Cuenta(10)\nc.ingresar(5)\nprint(c.saldo)", correct: "15", feedback: "El saldo pasa de 10 a 15." },
        
        { id: 12, type: "exact", text: "¿Qué valor exacto mostrará este código?\n\nclass Bombilla:\n    def __init__(self):\n        self.encendida = False\n\n    def encender(self):\n        self.encendida = True\n\nb = Bombilla()\nb.encender()\nprint(b.encendida)", correct: "True", feedback: "Tras llamar a encender(), el valor es True." },
        
        { id: 13, type: "relacionar", text: "Relaciona cada hueco con la palabra que completa correctamente el código.", left: ["class Persona: print(p._____)", "class Libro: print(l._____)", "class Coche: print(c._____)", "class Alumno: print(a._____)", "class Cuenta: print(c._____)"], rightOptions: ["nombre", "prestado", "velocidad", "nota", "saldo"], correct: ["nombre", "prestado", "velocidad", "nota", "saldo"], feedback: "Cada objeto imprime su atributo correspondiente." },
        
        { id: 14, type: "relacionar", text: "Relaciona cada código con el nombre del método que se está llamando.", left: ["t.subir(2)", "c.ingresar(10)", "c.acelerar()", "b.encender()", "l.prestar()"], rightOptions: ["subir", "ingresar", "acelerar", "encender", "prestar"], correct: ["subir", "ingresar", "acelerar", "encender", "prestar"], feedback: "Se identifica el nombre del método llamado en cada caso." },
        
        { id: 15, type: "relacionar", text: "Relaciona cada fragmento de código con el valor que muestra (velocidad del coche).", left: ["Coche velocidad = 2", "Coche velocidad = 1", "Coche velocidad = 3", "Coche velocidad = 0", "Coche velocidad = 4"], rightOptions: ["2", "1", "3", "0", "4"], correct: ["2", "1", "3", "0", "4"], feedback: "Se imprime el valor del atributo velocidad." },

        { id: 16, type: "exact", text: "¿Qué número exacto devolverá el método area en este caso?\n\nclass Rectangulo:\n    def __init__(self, base, altura):\n        self.base = base\n        self.altura = altura\n\n    def area(self):\n        return self.base * self.altura\n\nr = Rectangulo(3, 6)\nprint(r.area())", correct: "18", feedback: "El área es 3 × 6 = 18." },
        
        { id: 17, type: "completar", text: "Escribe la palabra exacta que falta para que el código muestre 9.\n\nclass Alumno:\n    def __init__(self, nota):\n        self.nota = nota\n\na = Alumno(9)\nprint(a._____)", correct: "nota", feedback: "El atributo se llama nota." },
        
        { id: 18, type: "exact", text: "¿Qué número exacto mostrará este código?\n\nclass Termometro:\n    def __init__(self, temperatura=0):\n        self.temperatura = temperatura\n\n    def subir(self, grados):\n        self.temperatura += grados\n\nt = Termometro(7)\nt.subir(4)\nprint(t.temperatura)", correct: "11", feedback: "La temperatura pasa de 7 a 11." },
        
        { id: 19, type: "completar", text: "Completa los huecos para que el código muestre Luis.\n\nclass Persona:\n    def __init__(self, nombre):\n        self._____ = nombre\n\np = Persona(\"Luis\")\nprint(p._____)", correct: "nombre;nombre", feedback: "El atributo usado en ambos huecos es nombre." },
        
        { id: 20, type: "completar", text: "Completa los huecos para que el código muestre 8.\n\nclass Alumno:\n    def __init__(self, nota):\n        self._____ = nota\n\na = Alumno(8)\nprint(a._____)", correct: "nota;nota", feedback: "El atributo usado en ambos huecos es nota." },

        // ==================== CUESTIONARIO 5 POO ====================
        { id: 21, type: "completar", text: "Completa los huecos para que el código muestre 12.\n\nclass Rectangulo:\n    def __init__(self, base, altura):\n        self.base = base\n        self.altura = altura\n\n    def _____(self):\n        return self.base * self.altura\n\nr = Rectangulo(3, 4)\nprint(r._____())", correct: "area;area", feedback: "El método se llama area." },
        
        { id: 22, type: "completar", text: "Completa los huecos para que el código muestre 20.\n\nclass Coche:\n    def __init__(self, velocidad=0):\n        self.velocidad = velocidad\n\n    def acelerar(self, cantidad):\n        self.velocidad += cantidad\n\nc = Coche()\nc._____(20)\nprint(c._____)", correct: "acelerar;velocidad", feedback: "Hay que llamar al método acelerar y después acceder al atributo velocidad." },
        
        { id: 23, type: "unique", text: "¿Qué muestra este código?\n\nclass Coche:\n    def __init__(self, marca, velocidad=0):\n        self.marca = marca\n        self.velocidad = velocidad\n\n    def acelerar(self, cantidad):\n        self.velocidad += cantidad\n\nc1 = Coche(\"Ford\")\nc1.acelerar(30)\nprint(c1.velocidad)", options: ["Da error porque falta modelo", "0", "\"Ford\"", "Da error porque velocidad no existe", "30"], correct: "30", feedback: "La velocidad inicial es 0 y, tras acelerar 30, se imprime 30." },

        { id: 25, type: "unique", text: "¿Qué muestra este código?\n\nclass Libro:\n    def __init__(self):\n        self.prestado = False\n\n    def prestar(self):\n        self.prestado = True\n\n    def devolver(self):\n        self.prestado = False\n\nl = Libro()\nl.prestar()\nl.devolver()\nprint(l.prestado)", options: ["0", "Error", "True", "False", "prestado"], correct: "False", feedback: "Se presta y luego se devuelve, así que el atributo queda en False." }

    // Helper: barajar (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getRandomQuestions(n) {
        let shuffledAll = shuffleArray([...MASTER_QUESTIONS]);
        return shuffledAll.slice(0, n);
    }

    function shuffleOptions(question) {
        if (question.type === "unique" || question.type === "multiple") {
            return shuffleArray([...question.options]);
        }
        return null;
    }

    let currentQuestions = [];
    let optionsMap = new Map();

    function renderTest(questions) {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        currentQuestions = questions;
        optionsMap.clear();

        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.dataset.qid = q.id;
            card.dataset.type = q.type;

            const titleSpan = document.createElement('div');
            titleSpan.className = 'question-title';
            titleSpan.innerText = `Pregunta ${idx+1} · ${q.type === 'unique' ? 'Selección única' : q.type === 'multiple' ? 'Selección múltiple' : q.type === 'relacionar' ? 'Relacionar' : q.type === 'completar' ? 'Completar' : 'Respuesta exacta'}`;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'question-text';
            textDiv.innerText = q.text;

            card.appendChild(titleSpan);
            card.appendChild(textDiv);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            if (q.type === 'unique') {
                const shuffled = shuffleOptions(q);
                optionsMap.set(q.id, shuffled);
                shuffled.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option';
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `q_${q.id}`;
                    radio.value = opt;
                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(' ' + opt));
                    optionsDiv.appendChild(label);
                });
            } 
            else if (q.type === 'multiple') {
                const shuffled = shuffleOptions(q);
                optionsMap.set(q.id, shuffled);
                shuffled.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.name = `q_${q.id}`;
                    cb.value = opt;
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(' ' + opt));
                    optionsDiv.appendChild(label);
                });
            }
            else if (q.type === 'relacionar') {
                const leftItems = q.left;
                const rightOpts = q.rightOptions;
                const shuffledRight = shuffleArray([...rightOpts]);
                optionsMap.set(q.id, shuffledRight);
                leftItems.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.alignItems = 'center';
                    row.style.gap = '1rem';
                    row.style.flexWrap = 'wrap';
                    row.style.marginBottom = '0.7rem';
                    row.style.background = '#111827';
                    row.style.padding = '0.5rem';
                    row.style.borderRadius = '1rem';
                    row.innerHTML = `<span style="min-width: 250px;">${item}</span>
                                     <select class="rel-select" data-qid="${q.id}" data-pos="${i}" style="background:#0f172a; border:1px solid #334155; padding:0.5rem; border-radius:1rem; color:white; min-width:140px;">
                                        <option value="">-- Selecciona --</option>
                                        ${shuffledRight.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                                     </select>`;
                    optionsDiv.appendChild(row);
                });
            }
            else if (q.type === 'completar') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'Escribe la respuesta (si son varias separa con ;)';
                input.style.width = '100%';
                input.style.maxWidth = '400px';
                input.className = 'completar-input';
                input.setAttribute('data-qid', q.id);
                optionsDiv.appendChild(input);
                const small = document.createElement('small');
                small.innerText = '📝 Ejemplo: palabra1;palabra2';
                small.style.display = 'block';
                small.style.marginTop = '0.3rem';
                small.style.color = '#94a3b8';
                optionsDiv.appendChild(small);
            }
            else if (q.type === 'exact') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'Escribe el valor exacto';
                input.style.width = '200px';
                input.className = 'exact-input';
                input.setAttribute('data-qid', q.id);
                optionsDiv.appendChild(input);
            }

            card.appendChild(optionsDiv);
            const fbDiv = document.createElement('div');
            fbDiv.className = 'feedback';
            fbDiv.style.display = 'none';
            fbDiv.id = `fb_${q.id}`;
            card.appendChild(fbDiv);
            container.appendChild(card);
        });
        document.getElementById('resultArea').style.display = 'none';
    }

    function evaluateTest() {
        let score = 0;
        const total = currentQuestions.length;

        for (let q of currentQuestions) {
            let isCorrect = false;
            let userAnswer = null;
            let expected = q.correct;

            if (q.type === 'unique') {
                const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
                userAnswer = selected ? selected.value : null;
                isCorrect = (userAnswer === expected);
                if (isCorrect) score++;
            }
            else if (q.type === 'multiple') {
                const selected = Array.from(document.querySelectorAll(`input[name="q_${q.id}"]:checked`)).map(cb => cb.value);
                userAnswer = selected;
                let expectedArr = Array.isArray(expected) ? expected : [expected];
                const normUser = [...userAnswer].sort();
                const normExp = [...expectedArr].sort();
                isCorrect = normUser.length === normExp.length && normUser.every((v,i) => v === normExp[i]);
                if (isCorrect) score++;
            }
            else if (q.type === 'relacionar') {
                const selects = document.querySelectorAll(`.rel-select[data-qid="${q.id}"]`);
                userAnswer = Array.from(selects).map(sel => sel.value);
                let expectedArr = Array.isArray(expected) ? expected : [expected];
                isCorrect = userAnswer.length === expectedArr.length && userAnswer.every((val,i) => val === expectedArr[i]);
                if (isCorrect) score++;
            }
            else if (q.type === 'completar') {
                const input = document.querySelector(`.completar-input[data-qid="${q.id}"]`);
                let raw = input ? input.value.trim().toLowerCase() : '';
                let userParts = raw.split(';').map(s => s.trim());
                let expectedParts = expected.toLowerCase().split(';').map(s => s.trim());
                isCorrect = userParts.length === expectedParts.length && userParts.every((p,i) => p === expectedParts[i]);
                if (isCorrect) score++;
            }
            else if (q.type === 'exact') {
                const input = document.querySelector(`.exact-input[data-qid="${q.id}"]`);
                userAnswer = input ? input.value.trim() : '';
                isCorrect = (userAnswer == expected);
                if (isCorrect) score++;
            }

            const fbDiv = document.getElementById(`fb_${q.id}`);
            if (fbDiv) {
                fbDiv.style.display = 'block';
                fbDiv.innerHTML = `<strong>${isCorrect ? '✅ Correcto' : '❌ Incorrecto'}</strong><br>${q.feedback}<br>📌 Respuesta esperada: ${expected}`;
                fbDiv.style.borderLeftColor = isCorrect ? '#10b981' : '#ef4444';
            }
        }

        const resultDiv = document.getElementById('resultArea');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<div class="score">🎯 Puntuación: ${score} / ${total}</div>
                               <button id="retryBtn" class="btn-secondary" style="margin-top:1rem; padding:0.6rem 1.5rem;">🔄 Nuevo test aleatorio</button>`;
        document.getElementById('retryBtn')?.addEventListener('click', () => generateNewTest());
    }

    function generateNewTest() {
        const num = parseInt(document.getElementById('numQuestionsSelect').value);
        const randomQs = getRandomQuestions(num);
        renderTest(randomQs);
    }

    document.getElementById('newTestBtn').addEventListener('click', generateNewTest);
    document.getElementById('submitBtn').addEventListener('click', evaluateTest);
    generateNewTest();
</script>
</body>
</html>
